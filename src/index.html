<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数学消消乐：蓝天大冒险</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        /* 蓝天白云风格 */
        body {
            font-family: 'Fredoka', 'ZCOOL KuaiLe', sans-serif;
            background: linear-gradient(180deg, #60a5fa 0%, #bfdbfe 80%, #86efac 80%);
            min-height: 100vh;
            touch-action: manipulation;
            user-select: none;
            overflow: hidden;
            position: relative;
        }

        /* 动态云朵 */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            animation: floatCloud linear infinite;
            z-index: 1; /* 云朵在最后 */
            filter: blur(1px);
        }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: inherit; border-radius: 50%; }
        .cloud-1 { width: 120px; height: 40px; top: 10%; left: -120px; animation-duration: 35s; }
        .cloud-1::after { width: 50px; height: 50px; top: -25px; left: 20px; }
        .cloud-1::before { width: 40px; height: 40px; top: -15px; right: 20px; }
        .cloud-2 { width: 100px; height: 35px; top: 30%; left: -100px; animation-duration: 45s; animation-delay: 5s; }
        .cloud-2::after { width: 40px; height: 40px; top: -20px; left: 15px; }
        .cloud-3 { width: 160px; height: 50px; top: 15%; left: -160px; animation-duration: 40s; animation-delay: 20s; }
        .cloud-3::after { width: 70px; height: 70px; top: -35px; left: 25px; }
        .cloud-3::before { width: 50px; height: 50px; top: -20px; right: 25px; }

        @keyframes floatCloud {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }

        /* 草原与羊群装饰 */
        .grassland {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15vh; /* 占据底部 */
            background: linear-gradient(180deg, #86efac 0%, #4ade80 100%);
            border-top: 6px solid #bbf7d0;
            z-index: 2;
            overflow: hidden;
        }
        
        .sheep-group {
            position: absolute;
            bottom: 15px;
            right: 10%;
            display: flex;
            gap: 20px;
            z-index: 3;
        }

        .sheep {
            font-size: 2.5rem;
            animation: graze 4s infinite ease-in-out;
            transform-origin: bottom center;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
            cursor: pointer;
        }
        .sheep:nth-child(2) { animation-delay: 1s; font-size: 2rem; }
        .sheep:nth-child(3) { animation-delay: 2s; font-size: 2.2rem; }

        @keyframes graze {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(2px); }
        }

        /* 防伪标识 */
        .watermark {
            position: fixed;
            bottom: 5px;
            right: 10px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
            z-index: 50;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            font-family: sans-serif;
            pointer-events: none;
        }

        /* 游戏容器 */
        .game-container {
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2);
            border: 4px solid #fff;
            position: relative;
            z-index: 10;
        }

        /* 方块样式 */
        .tile {
            background: #ffffff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #0369a1;
            box-shadow: 0 5px 0 #bae6fd, 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s, opacity 0.2s;
            position: relative;
            z-index: 10;
            border: 2px solid #e0f2fe;
        }

        .tile:active { transform: translateY(5px); box-shadow: 0 0 0 #bae6fd; }

        /* 洗牌时的动画状态 */
        .tile.shuffling {
            transform: scale(0.1) rotate(360deg);
            opacity: 0.5;
            transition: all 0.4s ease-in-out;
        }

        .tile.selected {
            background: #fef9c3;
            color: #b45309;
            border-color: #fcd34d;
            box-shadow: 0 5px 0 #fcd34d, 0 0 15px rgba(251, 191, 36, 0.5);
            transform: scale(0.96) translateY(2px);
        }

        .tile.matched { animation: starBurst 0.6s forwards; pointer-events: none; }
        
        @keyframes starBurst {
            0% { transform: scale(1) rotate(0); opacity: 1; }
            50% { transform: scale(1.4) rotate(180deg); opacity: 0.8; background: #fbbf24; color: #fff; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .tile.wrong {
            background: #ffe4e6;
            color: #e11d48;
            box-shadow: 0 5px 0 #fda4af;
            border-color: #fda4af;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            75% { transform: translateX(5px) rotate(5deg); }
        }

        /* 网格 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.6rem;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            aspect-ratio: 1;
            padding: 0.5rem;
        }

        @media (max-width: 450px) {
            .game-grid { gap: 0.35rem; }
            .tile { font-size: 1.3rem; border-radius: 10px; box-shadow: 0 3px 0 #bae6fd; }
        }

        /* 吉祥物位置 */
        .mascot-container {
            position: absolute;
            left: 5px; 
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            pointer-events: none;
            width: 80px; 
            display: flex;
            justify-content: center;
        }
        
        @media (max-width: 800px) {
            .mascot-container {
                position: relative;
                left: auto;
                top: auto;
                transform: none;
                margin-bottom: -10px;
                z-index: 5;
                height: 60px;
                width: 100%;
            }
            .mascot { font-size: 3.5rem; }
        }

        .mascot {
            font-size: 6rem;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
            animation: fly 3s infinite ease-in-out;
            display: inline-block;
        }
        @keyframes fly {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .cute-btn {
            font-family: 'Fredoka', sans-serif;
            border: none;
            cursor: pointer;
            transition: all 0.1s;
        }
        .cute-btn:active { transform: scale(0.95); }

        /* 排行榜 */
        .leaderboard-row:nth-child(1) .rank { color: #f59e0b; font-size: 1.2em; } 
        .leaderboard-row:nth-child(2) .rank { color: #94a3b8; font-size: 1.1em; } 
        .leaderboard-row:nth-child(3) .rank { color: #b45309; font-size: 1.1em; } 
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    
    <!-- 草原与羊群 -->
    <div class="grassland"></div>
    <div class="sheep-group">
        <div class="sheep">🐑</div>
        <div class="sheep" style="transform: scaleX(-1)">🐑</div>
        <div class="sheep">🐑</div>
    </div>
    
    <!-- 防伪标识 -->
    <div class="watermark"></div>

    <div id="root" class="relative z-10 w-full min-h-screen flex flex-col"></div>

    <script type="text/babel">
        // --- 音乐播放器 ---
        class MusicPlayer {
            constructor() {
                this.ctx = null;
                this.isPlaying = false;
                this.tempo = 240; 
                this.timer = null;
                this.noteIndex = 0;
                this.melody = [
                    'E4', 'G4', 'C5', null, 'C5', 'G4', 'E4', null,
                    'F4', 'A4', 'D5', null, 'B4', 'G4', 'D4', null,
                    'E4', 'E4', 'F4', 'F4', 'G4', 'A4', 'G4', null,
                    'C5', 'B4', 'A4', 'G4', 'F4', 'E4', 'D4', null
                ];
                this.freqMap = { 'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23, 'G4': 392.00, 'A4': 440.00, 'B4': 493.88, 'C5': 523.25, 'D5': 587.33 };
            }
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); }
            toggle() { this.init(); if (this.isPlaying) this.stop(); else this.play(); return this.isPlaying; }
            play() { this.isPlaying = true; this.noteIndex = 0; this.playNextNote(); }
            stop() { this.isPlaying = false; clearTimeout(this.timer); }
            playNextNote() {
                if (!this.isPlaying) return;
                const note = this.melody[this.noteIndex % this.melody.length];
                if (note && this.ctx) this.playTone(this.freqMap[note], 0.1);
                this.noteIndex++;
                this.timer = setTimeout(() => this.playNextNote(), this.tempo);
            }
            playTone(freq, duration) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.08, this.ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration + 0.1);
            }
        }

        // --- 音效管理器 ---
        class SfxManager {
            constructor() { this.ctx = null; }
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); }
            play(type) {
                if(!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);

                if (type === 'click') {
                    osc.frequency.setValueAtTime(600, t);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                    osc.start(t); osc.stop(t + 0.1);
                } else if (type === 'shuffle') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(800, t + 0.3);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
                    osc.start(t); osc.stop(t + 0.3);
                } else if (type === 'select') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(400, t); osc.frequency.linearRampToValueAtTime(800, t + 0.1);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
                    osc.start(t); osc.stop(t + 0.1);
                } else if (type === 'match') {
                    const o2 = this.ctx.createOscillator(); const g2 = this.ctx.createGain();
                    o2.connect(g2); g2.connect(this.ctx.destination);
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, t);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.4);
                    o2.type = 'sine'; o2.frequency.setValueAtTime(1046.5, t);
                    g2.gain.setValueAtTime(0, t); g2.gain.linearRampToValueAtTime(0.1, t+0.1); g2.gain.exponentialRampToValueAtTime(0.01, t+0.5);
                    osc.start(t); osc.stop(t+0.5); o2.start(t); o2.stop(t+0.5);
                } else if (type === 'magic') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(1200, t + 0.5);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.5);
                    osc.start(t); osc.stop(t + 0.6);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
                    osc.start(t); osc.stop(t + 0.2);
                } else if (type === 'win') {
                    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                        o.connect(g); g.connect(this.ctx.destination); o.frequency.value = f;
                        g.gain.setValueAtTime(0.05, t + i*0.1); g.gain.exponentialRampToValueAtTime(0.001, t + i*0.1 + 0.6);
                        o.start(t + i*0.1); o.stop(t + i*0.1 + 0.6);
                    });
                }
            }
        }

        const musicPlayer = new MusicPlayer();
        const sfx = new SfxManager();

        // --- 游戏逻辑 ---
        const LEVELS = {
            add: [
                {id:1, name:"10以内加法 (起步)", range:[1,5]}, // a,b in 1-5, sum in 2-10
                {id:2, name:"20以内加法 (进阶)", range:[5,10]}, // a,b in 5-10
                {id:3, name:"100以内加法 (大师)", range:[10,50]} // a,b in 10-50
            ],
            sub: [
                {id:1, name:"10以内减法 (起步)", range:[5,10]}, // minuend in 5-10
                {id:2, name:"20以内减法 (进阶)", range:[10,20]}, // minuend in 10-20
                {id:3, name:"100以内减法 (大师)", range:[20,99]} // minuend in 20-99
            ],
            mul: [
                {id:1, name:"乘法起步 (1-3)", range:[1,3]},
                {id:2, name:"乘法进阶 (4-6)", range:[4,6]},
                {id:3, name:"乘法大师 (1-9)", range:[1,9]}
            ],
            div: [
                {id:1, name:"除法起步 (1-3)", range:[1,3]},
                {id:2, name:"除法进阶 (4-6)", range:[4,6]},
                {id:3, name:"除法大师 (1-9)", range:[1,9]}
            ]
        };

        const generateTriplets = (mode, levelId, count) => {
            let tiles = [];
            const config = LEVELS[mode].find(l => l.id === levelId);
            const [min, max] = config.range;

            for(let i=0; i<count; i++) {
                let a, b, c;
                
                if (mode === 'add') {
                    a = Math.floor(Math.random() * (max - min + 1)) + min;
                    b = Math.floor(Math.random() * (max - min + 1)) + min;
                    c = a + b; // Tiles: a, b, sum
                    tiles.push({ val: a }, { val: b }, { val: c });
                } 
                else if (mode === 'sub') {
                    c = Math.floor(Math.random() * (max - min + 1)) + min; // Minuend (Total)
                    b = Math.floor(Math.random() * (c - 1)) + 1; // Subtrahend
                    a = c - b; // Difference
                    // Tiles: Minuend, Subtrahend, Difference. Logic: b + a = c
                    tiles.push({ val: c }, { val: b }, { val: a });
                }
                else if (mode === 'mul') {
                    a = Math.floor(Math.random() * (max - min + 1)) + min;
                    b = Math.floor(Math.random() * 9) + 1;
                    c = a * b;
                    tiles.push({ val: a }, { val: b }, { val: c });
                } 
                else if (mode === 'div') {
                    c = Math.floor(Math.random() * (max - min + 1)) + min; // Quotient
                    b = Math.floor(Math.random() * 9) + 1; // Divisor
                    a = c * b; // Dividend
                    // Tiles: Dividend, Divisor, Quotient. Logic: b * c = a
                    tiles.push({ val: a }, { val: b }, { val: c });
                }
            }
            return tiles;
        };

        const generateLevelData = (mode, levelId) => {
            const rawTiles = generateTriplets(mode, levelId, 12);
            return rawTiles.map(t => ({ ...t, id: Math.random().toString(36).substr(2, 9), status: 'idle' }));
        };

        const shuffleArray = (array) => {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const STORAGE_KEY = 'math_game_rankings_v3';
        const getRankings = (mode, level) => {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')[`${mode}_${level}`] || []; } catch { return []; }
        };
        const saveRanking = (mode, level, name, time) => {
            try {
                const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                const key = `${mode}_${level}`;
                if (!data[key]) data[key] = [];
                data[key].push({ name, time, date: Date.now() });
                data[key].sort((a, b) => a.time - b.time || b.date - a.date);
                data[key] = data[key].slice(0, 20);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                return data[key];
            } catch { return []; }
        };

        const Button = ({ children, onClick, color="blue", className="", small=false, disabled=false }) => {
            const styles = {
                blue: "bg-blue-500 text-white shadow-[0_4px_0_#1d4ed8] hover:bg-blue-600",
                yellow: "bg-yellow-400 text-yellow-900 shadow-[0_4px_0_#b45309] hover:bg-yellow-500",
                green: "bg-green-500 text-white shadow-[0_4px_0_#15803d] hover:bg-green-600",
                pink: "bg-pink-500 text-white shadow-[0_4px_0_#be185d] hover:bg-pink-600",
                orange: "bg-orange-500 text-white shadow-[0_4px_0_#c2410c] hover:bg-orange-600",
                magic: "bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow-[0_4px_0_#9333ea] hover:scale-105 animate-pulse",
                gray: "bg-gray-400 text-white shadow-[0_4px_0_#4b5563] cursor-not-allowed"
            };
            return (
                <button disabled={disabled} onClick={(e) => { if(color!=='magic'&&!disabled) sfx.play('click'); if(onClick&&!disabled) onClick(e); }}
                    className={`cute-btn ${styles[disabled?'gray':color]} rounded-xl font-bold flex items-center justify-center ${small?'py-2 px-3 text-sm':'py-3 px-6 text-xl'} ${className}`}>
                    {children}
                </button>
            );
        };

        const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0'+s : s}`;
        };

        const App = () => {
            const [gameState, setGameState] = React.useState('home'); 
            const [mode, setMode] = React.useState('mul');
            const [level, setLevel] = React.useState(1);
            const [tiles, setTiles] = React.useState([]);
            const [selectedIndices, setSelectedIndices] = React.useState([]);
            const [isMusicOn, setIsMusicOn] = React.useState(false);
            const [mascotAction, setMascotAction] = React.useState('idle'); 
            const [hintText, setHintText] = React.useState("");
            const [timer, setTimer] = React.useState(0);
            const [playerName, setPlayerName] = React.useState("");
            const [showRanking, setShowRanking] = React.useState(false);
            const [leaderboard, setLeaderboard] = React.useState([]);
            
            const [isShuffling, setIsShuffling] = React.useState(false);

            React.useEffect(() => {
                let interval;
                if (gameState === 'playing') interval = setInterval(() => setTimer(p => p + 1), 1000);
                return () => clearInterval(interval);
            }, [gameState]);

            const startGame = (m, l) => {
                sfx.init(); musicPlayer.init();
                setMode(m); setLevel(l);
                setTiles(shuffleArray(generateLevelData(m, l)));
                setGameState('playing'); setSelectedIndices([]); setHintText(""); setTimer(0); setShowRanking(false); setPlayerName("");
            };

            const toggleMusic = () => { sfx.init(); setIsMusicOn(musicPlayer.toggle()); };

            const handleShuffle = () => {
                if(isShuffling) return; 
                sfx.play('shuffle');
                setIsShuffling(true); 

                setTimeout(() => {
                    setTiles(prevTiles => {
                        const matched = prevTiles.filter(t => t.status === 'matched');
                        const unmatchedCount = prevTiles.length - matched.length;
                        const numSets = Math.floor(unmatchedCount / 3);
                        const newRawTiles = generateTriplets(mode, level, numSets);
                        const newUnmatched = newRawTiles.map(t => ({
                            ...t,
                            id: Math.random().toString(36).substr(2, 9),
                            status: 'idle'
                        }));
                        return shuffleArray([...matched, ...newUnmatched]);
                    });
                    setSelectedIndices([]); 
                    setTimeout(() => { setIsShuffling(false); }, 50);
                }, 400); 
            };

            const magicClear = () => {
                sfx.play('magic'); setMascotAction('happy');
                const remainingIndices = tiles.map((t, i) => t.status !== 'matched' ? i : -1).filter(i => i !== -1);
                const newTiles = [...tiles];
                remainingIndices.forEach(i => newTiles[i].status = 'matched');
                setTiles(newTiles); setHintText("魔法消除！✨");
                setTimeout(() => { sfx.play('win'); setGameState('won'); setLeaderboard(getRankings(mode, level)); }, 1000);
            };

            const handleTileClick = (index) => {
                if (tiles[index].status === 'matched' || isShuffling) return;
                if (selectedIndices.length === 3) return;
                if (selectedIndices.includes(index)) { setSelectedIndices(prev => prev.filter(i => i !== index)); setHintText(""); return; }
                
                sfx.play('select');
                const newSelection = [...selectedIndices, index];
                setSelectedIndices(newSelection);
                updateHint(newSelection);
                if (newSelection.length === 3) checkMatch(newSelection);
            };

            const getOpSymbol = (m) => {
                if(m === 'add') return '+';
                if(m === 'sub') return '-';
                if(m === 'mul') return '×';
                if(m === 'div') return '÷';
                return '?';
            };

            const updateHint = (indices) => {
                if (indices.length === 0) { setHintText(""); return; }
                const vals = indices.map(i => tiles[i].val);
                const sym = getOpSymbol(mode);

                if (indices.length === 1) setHintText(`${vals[0]} ...`);
                else if (indices.length === 2) setHintText(`${vals[0]} ${sym} ${vals[1]} = ?`);
                else setHintText(`${vals[0]} ${sym} ${vals[1]} = ${vals[2]} ?`);
            };

            const checkMatch = (indices) => {
                const [v1, v2, v3] = indices.map(i => tiles[i].val);
                const nums = [v1, v2, v3].sort((a,b) => a-b); // Sort: Small, Medium, Large
                
                let success = false;
                
                // Logic check:
                // Add: a + b = c (Small + Medium = Large)
                // Sub: c - b = a (Large - Medium = Small) -> Same as a + b = c
                // Mul: a * b = c (Small * Medium = Large)
                // Div: c / b = a (Large / Medium = Small) -> Same as a * b = c

                if (mode === 'add' || mode === 'sub') {
                    if (nums[0] + nums[1] === nums[2]) success = true;
                } else {
                    if (nums[0] * nums[1] === nums[2]) success = true;
                }

                if (success) {
                    sfx.play('match'); setMascotAction('happy');
                    const newTiles = [...tiles];
                    indices.forEach(i => newTiles[i].status = 'matched');
                    setTiles(newTiles); setHintText("答对了！👏");
                    if (newTiles.every(t => t.status === 'matched')) { setTimeout(() => { sfx.play('win'); setGameState('won'); setLeaderboard(getRankings(mode, level)); }, 1000); }
                } else {
                    sfx.play('wrong'); setMascotAction('wrong'); setHintText("不对哦 ❌");
                    const newTiles = [...tiles]; indices.forEach(i => newTiles[i].status = 'wrong'); setTiles(newTiles);
                    setTimeout(() => {
                        const resetTiles = [...newTiles]; indices.forEach(i => resetTiles[i].status = 'idle'); setTiles(resetTiles); setMascotAction('idle'); setHintText("");
                    }, 800);
                }
                setTimeout(() => { setSelectedIndices([]); if(success) setMascotAction('idle'); }, 800);
            };

            const submitScore = () => {
                if (!playerName.trim()) return;
                const newRankings = saveRanking(mode, level, playerName.trim(), timer);
                setLeaderboard(newRankings); setShowRanking(true);
            };

            const remainingCount = tiles.filter(t => t.status !== 'matched').length;
            const canUseMagic = remainingCount > 0 && remainingCount <= 9;

            // --- 渲染 ---
            if (gameState === 'home') {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 relative z-10 w-full max-w-lg mx-auto">
                        <div className="mascot mb-4 text-8xl">🐱</div>
                        <h1 className="text-5xl font-bold text-blue-600 mb-2 drop-shadow-sm tracking-wide bg-white px-6 py-2 rounded-3xl shadow-lg">数学消消乐</h1>
                        <p className="text-blue-500 mb-2 text-xl font-bold">✈️ 蓝天大冒险</p>
                        <p className="text-blue-700 mb-8 text-sm font-semibold bg-white/60 px-4 py-1 rounded-full">温馨提示：注意保护眼睛哦！</p>
                        
                        <div className="w-full grid grid-cols-2 gap-4">
                             {/* New Modes Grid */}
                             <div className="col-span-1 space-y-3">
                                <Button color="pink" onClick={() => { sfx.init(); setMode('add'); setGameState('levelSelect'); }} className="w-full h-24 text-2xl flex-col shadow-pink-600/30">
                                    <span className="text-4xl mb-1">➕</span> 加法
                                </Button>
                                <Button color="blue" onClick={() => { sfx.init(); setMode('mul'); setGameState('levelSelect'); }} className="w-full h-24 text-2xl flex-col shadow-blue-600/30">
                                    <span className="text-4xl mb-1">✖</span> 乘法
                                </Button>
                             </div>
                             <div className="col-span-1 space-y-3">
                                <Button color="orange" onClick={() => { sfx.init(); setMode('sub'); setGameState('levelSelect'); }} className="w-full h-24 text-2xl flex-col shadow-orange-600/30">
                                    <span className="text-4xl mb-1">➖</span> 减法
                                </Button>
                                <Button color="green" onClick={() => { sfx.init(); setMode('div'); setGameState('levelSelect'); }} className="w-full h-24 text-2xl flex-col shadow-green-600/30">
                                    <span className="text-4xl mb-1">➗</span> 除法
                                </Button>
                             </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'levelSelect') {
                const levels = LEVELS[mode];
                const themeColors = { add: 'pink', sub: 'orange', mul: 'blue', div: 'green' };
                const color = themeColors[mode];

                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 relative z-10 w-full max-w-lg mx-auto">
                        <Button color="yellow" size="sm" className="mb-8" onClick={() => setGameState('home')}>
                            ⬅ 返回
                        </Button>
                        <h2 className={`text-4xl font-bold mb-8 text-${color === 'blue' || color === 'green' ? color+'-600' : color+'-500'} bg-white px-6 py-2 rounded-full shadow-lg`}>
                            选择难度 ({mode === 'add' ? '加法' : mode === 'sub' ? '减法' : mode === 'mul' ? '乘法' : '除法'})
                        </h2>
                        
                        <div className="grid gap-4 w-full">
                            {levels.map((l, idx) => (
                                <Button key={l.id} color={color} onClick={() => startGame(mode, l.id)} className="w-full text-left justify-between px-6 py-4">
                                    <span>{l.name}</span>
                                    <span>{idx === 0 ? '🌱' : idx === 1 ? '🚀' : '👑'}</span>
                                </Button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (gameState === 'playing') {
                const progress = tiles.filter(t => t.status === 'matched').length / tiles.length * 100;
                return (
                    <div className="flex-1 flex flex-col items-center py-4 px-2 max-w-2xl mx-auto z-10 relative w-full">
                        <div className="w-full flex justify-between items-center mb-3 px-2">
                            <Button color="yellow" small onClick={() => setGameState('levelSelect')}>⬅</Button>
                            <div className="bg-white/80 px-4 py-1 rounded-full font-bold text-blue-600 shadow border-2 border-white">⏱️ {formatTime(timer)}</div>
                            <div className="flex gap-2">
                                <Button color="blue" small onClick={handleShuffle} disabled={isShuffling}>🔀 洗牌</Button>
                                <Button color={isMusicOn ? "green" : "blue"} small onClick={toggleMusic}>{isMusicOn ? "🎵" : "🔇"}</Button>
                            </div>
                        </div>

                        <div className="mascot-container flex flex-col items-center">
                            <div className="mascot">
                                {mascotAction === 'idle' ? '🐱' : mascotAction === 'happy' ? '😻' : '🙀'}
                            </div>
                        </div>

                        <div className="w-full game-container p-4 mb-4 flex flex-col items-center relative mt-2">
                            <div className="text-xl font-bold text-blue-600 mb-2 min-h-[1.5em] flex items-center">
                                {hintText || (mode === 'add' ? "找出加数和和" : mode === 'sub' ? "找出被减数、减数和差" : mode === 'mul' ? "找出因数和积" : "找出被除数、除数和商")}
                            </div>
                            <div className="w-full bg-blue-100 rounded-full h-4 p-1 shadow-inner">
                                <div className="h-full rounded-full bg-gradient-to-r from-blue-400 to-green-400 transition-all duration-500" style={{width: `${progress}%`}}></div>
                            </div>
                        </div>

                        <div className="game-grid mb-20">
                            {tiles.map((tile, idx) => (
                                <div key={tile.id} 
                                    onClick={() => handleTileClick(idx)}
                                    className={`tile 
                                        ${tile.status} 
                                        ${isShuffling ? 'shuffling' : ''}
                                        ${selectedIndices.includes(idx) ? 'selected' : ''}
                                    `}
                                >
                                    {tile.val}
                                </div>
                            ))}
                        </div>

                        {canUseMagic && (
                            <div className="fixed bottom-6 right-6 magic-btn-enter z-50 flex flex-col items-end">
                                <div className="text-blue-600 font-bold mb-1 bg-white/80 px-2 rounded-lg animate-bounce">卡住了？点我！👇</div>
                                <Button color="magic" onClick={magicClear} className="shadow-2xl border-4 border-white">🪄 万能消除</Button>
                            </div>
                        )}
                    </div>
                );
            }

            if (gameState === 'won') {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-4 z-10 relative">
                        <div className="mascot mb-6 text-8xl animate-bounce">😻</div>
                        <h2 className="text-3xl font-bold text-blue-600 mb-2 bg-white px-6 py-2 rounded-full shadow-lg">挑战成功！</h2>
                        <p className="text-xl font-bold text-blue-500 mb-4 bg-white/50 px-4 rounded-lg">用时：{formatTime(timer)}</p>

                        <div className="bg-white/90 backdrop-blur p-6 rounded-3xl shadow-xl w-full max-w-sm text-center border-4 border-white max-h-[60vh] overflow-y-auto">
                            {!showRanking ? (
                                <>
                                    <h3 className="text-lg font-bold text-gray-700 mb-4">记录你的战绩？</h3>
                                    <input type="text" placeholder="输入你的名字" className="w-full p-3 rounded-xl border-2 border-blue-200 mb-4 text-center text-lg focus:outline-none focus:border-blue-400" maxLength="8" value={playerName} onChange={(e) => setPlayerName(e.target.value)} />
                                    <div className="flex gap-2 mb-4">
                                        <Button color="blue" onClick={submitScore} className="flex-1" disabled={!playerName}>提交</Button>
                                        <Button color="gray" onClick={() => setShowRanking(true)} className="flex-1">跳过</Button>
                                    </div>
                                </>
                            ) : (
                                <div className="mb-4">
                                    <h3 className="text-lg font-bold text-gray-700 mb-2 border-b-2 border-blue-100 pb-2">🏆 最强大脑排行榜</h3>
                                    {leaderboard.length === 0 ? <p className="text-gray-400 py-4">还没有记录，快来抢第一！</p> : 
                                        <div className="space-y-2">
                                            {leaderboard.slice(0, 5).map((entry, i) => (
                                                <div key={i} className="flex justify-between items-center bg-blue-50 p-2 rounded-lg leaderboard-row">
                                                    <span className="font-bold w-6 rank">{i + 1}</span>
                                                    <span className="flex-1 text-left truncate px-2 font-semibold text-gray-700">{entry.name}</span>
                                                    <span className="font-mono text-blue-600">{formatTime(entry.time)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    }
                                </div>
                            )}
                            <div className="flex flex-col gap-2 mt-4 pt-4 border-t-2 border-dashed border-gray-200">
                                <Button color="yellow" onClick={() => startGame(mode, level)} className="w-full">🔄 再玩一次</Button>
                                <Button color="blue" onClick={() => setGameState('levelSelect')} className="w-full" small>🏠 返回选关</Button>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
